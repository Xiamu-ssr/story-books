<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点点的暑架</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-dark: #1a1410;
  --bg-card: #2c2418;
  --accent-gold: #c9a84c;
  --accent-red: #b8423a;
  --text-light: #e8dcc8;
  --text-dim: #a89878;
  --text-faint: #6b5d4f;
}

html, body {
  width: 100%; min-height: 100%;
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-dark);
  color: var(--text-light);
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px 80px;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(184,66,58,0.04) 0%, transparent 50%),
    var(--bg-dark);
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 60px;
  max-width: 600px;
}

.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--accent-gold);
  letter-spacing: 6px;
  margin-bottom: 16px;
  text-shadow: 0 2px 30px rgba(201,168,76,0.2);
}

.header p {
  font-size: 16px;
  color: var(--text-dim);
  letter-spacing: 2px;
  line-height: 1.8;
}

.header .divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
  margin: 24px auto 0;
}

/* Books grid */
.books {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
  max-width: 1000px;
  width: 100%;
}

/* Book card */
.book-card {
  position: relative;
  background: var(--bg-card);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  border: 1px solid rgba(201,168,76,0.15);
  text-decoration: none;
  color: inherit;
  display: block;
}

.book-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: rgba(201,168,76,0.4);
  box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 40px rgba(201,168,76,0.1);
}

.book-cover {
  width: 100%;
  aspect-ratio: 3/4;
  background-size: cover;
  background-position: center;
  position: relative;
}

.book-cover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(26,20,16,0.95) 0%, rgba(26,20,16,0.3) 40%, transparent 70%);
}

.book-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 24px;
  z-index: 2;
}

.book-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-gold);
  margin-bottom: 8px;
  letter-spacing: 2px;
}

.book-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 12px;
  line-height: 1.6;
}

.book-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text-faint);
}

.book-meta .count {
  background: rgba(201,168,76,0.15);
  padding: 4px 10px;
  border-radius: 12px;
  color: var(--accent-gold);
  font-weight: 500;
}

.book-meta .status {
  display: flex;
  align-items: center;
  gap: 4px;
}

.book-meta .status::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4a4;
}

/* Coming soon card */
.book-card.coming-soon {
  opacity: 0.5;
  cursor: default;
  border-style: dashed;
}

.book-card.coming-soon:hover {
  transform: none;
  box-shadow: none;
  border-color: rgba(201,168,76,0.15);
}

.book-card.coming-soon .book-cover {
  background: var(--bg-card);
  display: flex;
  align-items: center;
  justify-content: center;
}

.book-card.coming-soon .book-cover::after {
  display: none;
}

.coming-soon-icon {
  font-size: 48px;
  opacity: 0.3;
}

.book-card.coming-soon .book-info {
  position: relative;
  padding: 24px;
}

.book-card.coming-soon .book-title {
  color: var(--text-faint);
}

.book-card.coming-soon .book-subtitle {
  color: var(--text-faint);
}

.book-card.coming-soon .book-meta .status::before {
  background: var(--text-faint);
}

/* Footer */
.footer {
  margin-top: 80px;
  text-align: center;
  font-size: 13px;
  color: var(--text-faint);
  letter-spacing: 1px;
}

.footer .heart {
  color: var(--accent-red);
}

/* Responsive */
@media (max-width: 640px) {
  .header h1 { font-size: 32px; letter-spacing: 4px; }
  .books { grid-template-columns: 1fr; gap: 24px; }
  .book-title { font-size: 20px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>点点的暑架</h1>

  <div class="divider"></div>
</div>

</div>

</html>
